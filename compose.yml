services:
  app:
    build:
      context: ./platform
      dockerfile: Dockerfile
    env_file:
      - ./platform/.env.docker.example
    ports:
      - '8000:8000'
    depends_on:
      - postgres
      - redis
      - meilisearch
      - minio

  queue:
    build:
      context: ./platform
      dockerfile: Dockerfile
    env_file:
      - ./platform/.env.docker.example
    command: php artisan queue:work --tries=1 --timeout=90
    depends_on:
      - postgres
      - redis
      - meilisearch
      - minio

  reverb:
    build:
      context: ./platform
      dockerfile: Dockerfile
    env_file:
      - ./platform/.env.docker.example
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - '8080:8080'
    depends_on:
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zen_core
      POSTGRES_USER: zen_core
      POSTGRES_PASSWORD: secret
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  meilisearch:
    image: getmeili/meilisearch:v1.11
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_ENV: development
    ports:
      - '7700:7700'
    volumes:
      - meilisearch-data:/meili_data

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  meilisearch-data:
  minio-data:
